spring.application.name=marketplace
spring.datasource.url=jdbc:postgresql://localhost:5432/readpath_lab
spring.datasource.username=readpath
spring.datasource.password=readpath
spring.jpa.open-in-view=false

readpath.product-search.baseline.products-table=products_moderate_skew
readpath.product-search.baseline.product-options-table=product_options_moderate_skew
readpath.product-search.read-path=db
readpath.product-search.open-search.base-url=http://localhost:9200
readpath.product-search.open-search.index-alias=products_search_read
readpath.product-search.open-search.write-alias=products_search_write
readpath.product-search.open-search.timeout-ms=500
readpath.product-search.open-search.circuit-breaker.enabled=true
readpath.product-search.open-search.circuit-breaker.failure-threshold=3
readpath.product-search.open-search.circuit-breaker.open-wait-ms=1000
readpath.product-search.open-search.circuit-breaker.half-open-permitted-calls=1
readpath.product-search.indexing.relay.enabled=false
readpath.product-search.indexing.relay.batch-size=20
readpath.product-search.indexing.relay.fixed-delay-ms=5000
readpath.product-search.indexing.relay.max-drain-rounds=5
readpath.product-search.indexing.relay.max-retry-count=3
readpath.product-search.indexing.relay.retry-delay-ms=10000
readpath.product-search.indexing.relay.processing-timeout-ms=60000
readpath.product-search.indexing.relay.instance-id=${HOSTNAME:local-relay}
