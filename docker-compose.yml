services:
  postgres:
    image: postgres:16
    container_name: readpath-postgres
    environment:
      POSTGRES_DB: readpath_lab
      POSTGRES_USER: readpath
      POSTGRES_PASSWORD: readpath
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readpath -d readpath_lab"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
